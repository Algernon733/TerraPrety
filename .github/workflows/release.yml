name: Create Release
run-name: Create Release ${{github.ref_name}}

on: 
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Semantic Mod Version'
        required: true
      vintage_story_version:
        description: 'Semantic Vintage Story Version'
        required: true
      release_description: 
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Containerized Build
        uses: darkluke1111/vsmb@main
        with: 
          vs_version: ${{ github.event.inputs.vintage_story_version }}

      - name: release
        uses: ncipollo/release-action@v1
        id: create_release
        with:
          draft: true
          prerelease: false
          tag: ${{ github.event.inputs.mod_version }}
          body: ${{ github.event.inputs.release_description }}
          artifacts: ${{ github.workspace }}/${{env.RESULT}}
          artifactContentType: application/zip